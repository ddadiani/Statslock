<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="style.css"/>
    <title>Statlock</title>
</head>

<body>
    <header class="sticky">
        <h1>Statslock</h1>
        <nav id="main-nav">
            <a href="/" class="button">
                <div id="deadlock">
                    <img src="/images/deadlock_icon.png" alt="deadlock icon"/>
                    <p>Deadlock</p>
                </div>
            </a>
            <a href="/content/comingsoon.html" class="button">
                <div id="dota">
                    <img src="/images/dota2_icon.png" alt="deadlock icon"/>
                    <p>Dota 2</p>
                </div>
            </a>
            <a href="/content/comingsoon.html" class="button">
                <div id="league">
                    <img src="/images/league_icon.png" alt="deadlock icon"/>
                    <p>League of Legends</p>
                </div>
            </a>
        </nav>
        <nav id="second-nav">
            <h2 class="button" id="hero-lookup-button">Hero Lookup</h2>
            <h2 class="button" id="player-lookup-button">Player Lookup</h2>
        </nav>
    </header>

    <section id="main-content">
        <!-- js injects template here -->
    </section>

    <!-- write template for hero / player lookup parts to use for js later -->
    <template id="hero-lookup">
        <h2>Hero Lookup</h2>
        <div>
            <input type="text" id="hero-input" placeholder="Enter hero name..."/>
            <img class="button" id="search-button" src="/images/search_icon.png" alt="search icon"/>
        </div>
        <div id="card">
            <div id="card-left">
                <img id="hero-image" src="" alt="hero image" style="border-radius: 10px;"/>
                <p class="dynamic-hero-color" id="hero-name" style="margin-top: 0; font-size: 26px;">Name</p>
            </div>
            <div id="card-right">
                <div style="display: flex; flex-direction: column;">
                    <h3 class="dynamic-hero-color">Lore</h3>
                    <p id="lore-text">lorem</p>
                </div>
                <div style="display: flex; flex-direction: column;">
                    <h3 class="dynamic-hero-color">Role</h3>
                    <p id="role-text">lorema</p>
                </div>
                <div style="display: flex; flex-direction: column;">
                    <h3 class="dynamic-hero-color">Playstyle</h3>
                    <p id="playstyle-text">blablabla</p>
                </div>
            </div>
        </div>
    </template>

    <template id="player-lookup">
        <h2>Player Lookup</h2>
        <div>
            <input type="text" id="player-input" placeholder="Enter player name..."/>
            <img class="button" id="search-button" src="/images/search_icon.png" alt="search icon"/>
        </div>
        <div id="history">
            <!-- js injects each match here -->
        </div>
    </template>

    <template id="match-template">
        <div class="match">
            <div>
                <p class="match-type"></p>
                <p class="days-after-played"></p>
                <p class="match-id"></p>
                <p class="match-result"></p>
                <p class="match-length"></p>
            </div>
            <div>
                <img src="" alt="hero" class="hero-image-player"/>
                <p class="hero-level"></p>
                <p class="kda"></p>
                <p class="kda-average"></p>
            </div>
            <div>
                <p class="souls"></p>
                <p class="last-hits"></p>
                <p class="denies"></p>
            </div>
        </div>
    </template>

    <script src="main.js"></script>
</body>

</html>
